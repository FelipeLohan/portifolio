<section id="experience" class="py-24 bg-white dark:bg-slate-900">
  <div class="max-w-[860px] mx-auto px-6">
    <app-section-title
      title="Experiência"
      subtitle="Onde aprendi e contribuí"
    />

    <div class="flex flex-col">
      @for (exp of experiences; track exp.id; let last = $last) {
        <div class="flex gap-6 items-stretch fade-in">

          <!-- Conector da timeline -->
          <div class="flex flex-col items-center flex-shrink-0 pt-6">
            <div [class]="'w-3 h-3 rounded-full border-2 border-white dark:border-slate-900 flex-shrink-0 z-10 '
                         + (exp.current
                            ? 'bg-blue-600 shadow-[0_0_0_4px_rgba(37,99,235,0.2)]'
                            : 'bg-slate-300 dark:bg-slate-600')">
            </div>
            @if (!last) {
              <div class="w-0.5 flex-1 bg-slate-200 dark:bg-slate-700 mt-1.5 min-h-6"></div>
            }
          </div>

          <!-- Card wrapper -->
          <div class="flex-1 min-w-0" [class]="last ? 'pb-0' : 'pb-7'">
            <app-experience-card [experience]="exp" />
          </div>

        </div>
      }
    </div>
  </div>
</section>
