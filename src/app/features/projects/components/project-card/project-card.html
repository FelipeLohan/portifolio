<article class="flex flex-col gap-4 bg-white border border-slate-200 rounded-2xl p-6
                transition-all duration-200 h-full
                hover:-translate-y-1 hover:border-blue-300
                hover:shadow-[0_12px_40px_rgba(37,99,235,0.1)]
                shadow-sm">

  <!-- Header: ícone + badge destaque -->
  <div class="flex items-center justify-between">
    <div class="flex items-center justify-center w-10 h-10
                bg-blue-50 rounded-[0.625rem] text-blue-600">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="16 18 22 12 16 6"></polyline>
        <polyline points="8 6 2 12 8 18"></polyline>
      </svg>
    </div>
    @if (project().highlight) {
      <app-badge label="🏆 Destaque" variant="accent" />
    }
  </div>

  <h3 class="text-[1.05rem] font-bold text-slate-900 m-0 leading-snug">
    {{ project().title }}
  </h3>

  <p class="text-sm text-slate-500 leading-[1.65] m-0 flex-1">
    {{ project().description }}
  </p>

  <div class="flex flex-wrap gap-1.5">
    @for (tech of project().techs; track tech) {
      <app-badge [label]="tech" variant="default" />
    }
  </div>

  <!-- Rodapé com links -->
  <div class="flex items-center gap-3 pt-2 border-t border-slate-100 mt-auto">
    @if (project().githubUrl) {
      <a [href]="project().githubUrl" target="_blank" rel="noopener"
         class="inline-flex items-center gap-1.5 text-[0.82rem] font-semibold
                text-slate-400 no-underline transition-colors duration-200 hover:text-slate-900">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
        </svg>
        GitHub
      </a>
    }
    @if (project().liveUrl) {
      <a [href]="project().liveUrl" target="_blank" rel="noopener"
         class="inline-flex items-center gap-1.5 text-[0.82rem] font-semibold
                text-blue-600 no-underline transition-colors duration-200 hover:text-blue-800">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
          <polyline points="15 3 21 3 21 9"></polyline>
          <line x1="10" y1="14" x2="21" y2="3"></line>
        </svg>
        Demo
      </a>
    }
  </div>

</article>
