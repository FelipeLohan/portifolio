<header
  [class]="'fixed top-0 left-0 right-0 z-[100] transition-all duration-300 ease-in-out '
    + (scrolled()
        ? 'bg-white/95 dark:bg-slate-900/95 backdrop-blur-md shadow-sm border-b border-slate-200 dark:border-slate-700 py-3'
        : 'bg-transparent py-5')"
>
  <div class="max-w-[1200px] mx-auto px-6 flex items-center justify-between">

    <a href="#hero" class="no-underline flex items-baseline gap-[0.1rem]" (click)="closeMenu()">
      <span class="text-lg font-bold text-slate-900 dark:text-slate-100 tracking-tight">Felipe Lohan</span>
      <span class="text-2xl font-bold text-blue-600 leading-none">.</span>
    </a>

    <nav
      [class]="'fixed md:static inset-0 md:inset-auto bg-white dark:bg-slate-900 md:bg-transparent dark:md:bg-transparent '
        + 'flex flex-col md:flex-row items-center justify-center md:justify-end gap-6 md:gap-1 '
        + 'transition-transform duration-300 z-[-1] md:z-auto '
        + (menuOpen() ? 'translate-x-0' : 'translate-x-full md:translate-x-0')"
    >
      @for (link of navLinks; track link.anchor) {
        <a
          [href]="link.anchor"
          class="text-slate-500 dark:text-slate-400 no-underline font-medium rounded-md transition-colors duration-200
                 hover:text-slate-900 dark:hover:text-slate-100 hover:bg-slate-100 dark:hover:bg-slate-800
                 text-2xl px-6 py-3 md:text-[0.9rem] md:px-3 md:py-2"
          (click)="closeMenu()"
        >{{ link.label }}</a>
      }
      <a
        href="mailto:felipelohan@gmail.com"
        class="text-blue-600 no-underline font-semibold border border-blue-600
               rounded-md transition-all duration-200 hover:bg-blue-600 hover:text-white
               text-xl px-5 py-2.5 md:text-[0.9rem] md:px-4 md:py-2 md:ml-2"
        (click)="closeMenu()"
      >Contato</a>
    </nav>

    <div class="flex items-center gap-2">
      <!-- Botão de tema -->
      <button
        (click)="theme.toggleTheme()"
        [attr.aria-label]="theme.isDark() ? 'Ativar tema claro' : 'Ativar tema escuro'"
        class="w-9 h-9 flex items-center justify-center rounded-lg border
               border-slate-200 dark:border-slate-700
               text-slate-500 dark:text-slate-400
               bg-transparent hover:bg-slate-100 dark:hover:bg-slate-800
               hover:text-slate-900 dark:hover:text-slate-100
               transition-all duration-200"
      >
        @if (theme.isDark()) {
          <!-- Ícone Sol -->
          <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="4"/>
            <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
          </svg>
        } @else {
          <!-- Ícone Lua -->
          <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        }
      </button>

      <!-- Botão hamburguer (mobile) -->
      <button
        class="flex md:hidden flex-col gap-[5px] bg-transparent border-0 cursor-pointer p-2"
        (click)="toggleMenu()"
        [attr.aria-expanded]="menuOpen()"
        aria-label="Menu"
      >
        <span [class]="'block w-[22px] h-[2px] bg-slate-800 dark:bg-slate-200 rounded-sm transition-all duration-300 '
                      + (menuOpen() ? 'translate-y-[7px] rotate-45' : '')"></span>
        <span [class]="'block w-[22px] h-[2px] bg-slate-800 dark:bg-slate-200 rounded-sm transition-all duration-300 '
                      + (menuOpen() ? 'opacity-0' : '')"></span>
        <span [class]="'block w-[22px] h-[2px] bg-slate-800 dark:bg-slate-200 rounded-sm transition-all duration-300 '
                      + (menuOpen() ? '-translate-y-[7px] -rotate-45' : '')"></span>
      </button>
    </div>

  </div>
</header>
