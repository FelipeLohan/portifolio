<header
  [class]="'fixed top-0 left-0 right-0 z-[100] transition-all duration-300 ease-in-out '
    + (scrolled() ? 'bg-white/95 backdrop-blur-md shadow-sm border-b border-slate-200 py-3' : 'bg-transparent py-5')"
>
  <div class="max-w-[1200px] mx-auto px-6 flex items-center justify-between">

    <a href="#hero" class="no-underline flex items-baseline gap-[0.1rem]" (click)="closeMenu()">
      <span class="text-lg font-bold text-slate-900 tracking-tight">Felipe Lohan</span>
      <span class="text-2xl font-bold text-blue-600 leading-none">.</span>
    </a>

    <nav
      [class]="'fixed md:static inset-0 md:inset-auto bg-white md:bg-transparent '
        + 'flex flex-col md:flex-row items-center justify-center md:justify-end gap-6 md:gap-1 '
        + 'transition-transform duration-300 z-[-1] md:z-auto '
        + (menuOpen() ? 'translate-x-0' : 'translate-x-full md:translate-x-0')"
    >
      @for (link of navLinks; track link.anchor) {
        <a
          [href]="link.anchor"
          class="text-slate-500 no-underline font-medium rounded-md transition-colors duration-200
                 hover:text-slate-900 hover:bg-slate-100
                 text-2xl px-6 py-3 md:text-[0.9rem] md:px-3 md:py-2"
          (click)="closeMenu()"
        >{{ link.label }}</a>
      }
      <a
        href="mailto:felipelohan@gmail.com"
        class="text-blue-600 no-underline font-semibold border border-blue-600
               rounded-md transition-all duration-200 hover:bg-blue-600 hover:text-white
               text-xl px-5 py-2.5 md:text-[0.9rem] md:px-4 md:py-2 md:ml-2"
        (click)="closeMenu()"
      >Contato</a>
    </nav>

    <button
      class="flex md:hidden flex-col gap-[5px] bg-transparent border-0 cursor-pointer p-2"
      (click)="toggleMenu()"
      [attr.aria-expanded]="menuOpen()"
      aria-label="Menu"
    >
      <span [class]="'block w-[22px] h-[2px] bg-slate-800 rounded-sm transition-all duration-300 '
                    + (menuOpen() ? 'translate-y-[7px] rotate-45' : '')"></span>
      <span [class]="'block w-[22px] h-[2px] bg-slate-800 rounded-sm transition-all duration-300 '
                    + (menuOpen() ? 'opacity-0' : '')"></span>
      <span [class]="'block w-[22px] h-[2px] bg-slate-800 rounded-sm transition-all duration-300 '
                    + (menuOpen() ? '-translate-y-[7px] -rotate-45' : '')"></span>
    </button>

  </div>
</header>
