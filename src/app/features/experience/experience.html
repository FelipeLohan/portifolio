<section id="experience" class="experience">
  <div class="experience__container">
    <app-section-title
      title="Experiência"
      subtitle="Onde aprendi e contribuí"
    />

    <div class="experience__timeline">
      @for (exp of experiences; track exp.id; let last = $last) {
        <div class="experience__item fade-in">
          <div class="experience__connector">
            <div class="experience__dot" [class.experience__dot--current]="exp.current"></div>
            @if (!last) {
              <div class="experience__line"></div>
            }
          </div>
          <div class="experience__card-wrapper">
            <app-experience-card [experience]="exp" />
          </div>
        </div>
      }
    </div>
  </div>
</section>
