<section id="tech-stack" class="py-24 bg-white dark:bg-slate-900">
  <div class="max-w-[1200px] mx-auto px-6">
    <app-section-title
      title="Tecnologias"
      subtitle="Ferramentas que uso no dia a dia"
    />

    <div class="flex flex-wrap justify-center gap-4 fade-in">
      @for (tech of techs; track tech.name) {
        <div class="group flex flex-col items-center gap-2 w-[72px]">
          <div class="w-14 h-14 flex items-center justify-center
                      bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl shadow-sm
                      transition-all duration-200
                      group-hover:border-blue-200 dark:group-hover:border-blue-700 group-hover:shadow-md group-hover:-translate-y-1">
            <img [src]="tech.iconUrl" [alt]="tech.name" class="w-8 h-8" />
          </div>
          <span class="text-[0.7rem] font-medium text-slate-500 dark:text-slate-400 text-center leading-tight">
            {{ tech.name }}
          </span>
        </div>
      }
    </div>
  </div>
</section>
